<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片颜色聚类可视化</title>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all';this.onload=null">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet"></noscript>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        /* ========== CSS 变量：莫兰迪色系 + Glassmorphism ========== */
        :root {
            --bg-primary: #e8e0d9;
            --bg-secondary: #f0ebe5;
            --card-bg: rgba(255, 255, 255, 0.18);
            --card-border: rgba(255, 255, 255, 0.25);
            --card-hover: rgba(255, 255, 255, 0.28);
            --border: #d9cec3;
            --border-light: #e5ddd5;
            --text-primary: #5c5248;
            --text-secondary: #8a7e72;
            --text-muted: #b0a599;
            --accent-rose: #c4a59d;
            --accent-rose-deep: #b0887e;
            --accent-sage: #a8b5a2;
            --accent-sage-deep: #8b9a84;
            --accent-lavender: #b8a9c9;
            --accent-warm: #c9b896;
            --shadow-sm: 0 2px 12px rgba(140, 120, 100, 0.08);
            --shadow-md: 0 4px 20px rgba(140, 120, 100, 0.10);
            --shadow-lg: 0 8px 32px rgba(140, 120, 100, 0.12);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --glass-blur: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        /* ========== 古韵 Aurora 动态流动背景 ========== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -2;
            background: linear-gradient(165deg, #f3ede8 0%, #ebe3da 25%, #f0e9e2 50%, #e8ded4 75%, #f2ece6 100%);
        }

        .aurora-bg {
            position: fixed;
            inset: -60%;
            z-index: -1;
            pointer-events: none;
            filter: blur(120px);
            opacity: 0.72;
        }

        .aurora-layer {
            position: absolute;
            border-radius: 50%;
            animation: auroraFlow var(--aurora-dur, 20s) ease-in-out infinite;
            animation-delay: var(--aurora-delay, 0s);
        }

        /* 莫兰迪紫 — 左上区域 */
        .aurora-1 {
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle at 35% 35%, rgba(184, 169, 201, 0.50) 0%, rgba(184, 169, 201, 0.22) 35%, transparent 65%);
            top: -20%;
            left: -15%;
            --aurora-dur: 22s;
            --aurora-delay: 0s;
        }

        /* 莫兰迪绿 — 右下区域 */
        .aurora-2 {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle at 55% 55%, rgba(168, 181, 162, 0.45) 0%, rgba(168, 181, 162, 0.18) 35%, transparent 65%);
            top: 35%;
            right: -20%;
            --aurora-dur: 24s;
            --aurora-delay: -7s;
        }

        /* 莫兰迪粉 — 右上区域 */
        .aurora-3 {
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle at 60% 30%, rgba(196, 165, 157, 0.45) 0%, rgba(196, 165, 157, 0.18) 35%, transparent 65%);
            top: -12%;
            right: 0%;
            --aurora-dur: 26s;
            --aurora-delay: -13s;
        }

        /* 莫兰迪暖驼 — 左下区域 */
        .aurora-4 {
            width: 62vw;
            height: 62vw;
            background: radial-gradient(circle at 30% 65%, rgba(201, 184, 150, 0.42) 0%, rgba(201, 184, 150, 0.17) 35%, transparent 65%);
            bottom: -18%;
            left: 5%;
            --aurora-dur: 28s;
            --aurora-delay: -5s;
        }

        /* 雾灰蓝 — 中偏上 */
        .aurora-5 {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle at 50% 35%, rgba(162, 174, 189, 0.38) 0%, rgba(186, 178, 172, 0.16) 35%, transparent 65%);
            top: 15%;
            left: 22%;
            --aurora-dur: 30s;
            --aurora-delay: -10s;
        }

        /* 暖米光晕 — 中心区域 */
        .aurora-6 {
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle at 48% 52%, rgba(210, 195, 180, 0.35) 0%, rgba(220, 205, 188, 0.14) 35%, transparent 65%);
            top: -8%;
            left: 5%;
            --aurora-dur: 32s;
            --aurora-delay: -16s;
        }

        @keyframes auroraFlow {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            20% {
                transform: translate(3%, -2%) scale(1.04) rotate(0.8deg);
            }
            40% {
                transform: translate(-2%, -4%) scale(0.96) rotate(-0.5deg);
            }
            60% {
                transform: translate(4%, 3%) scale(1.03) rotate(0.3deg);
            }
            80% {
                transform: translate(-3%, 2%) scale(0.97) rotate(-0.6deg);
            }
            100% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 20px;
        }

        header {
            text-align: center;
            padding: 32px 0 20px;
        }

        .header-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .header-dots {
            display: flex;
            gap: 5px;
            align-items: flex-end;
            padding-bottom: 4px;
        }

        .header-dots .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: dotFloat 2s ease-in-out infinite;
        }

        .header-dots .dot:nth-child(1) { background: #c4a59d; animation-delay: 0s; }
        .header-dots .dot:nth-child(2) { background: #a8b5a2; animation-delay: 0.15s; }
        .header-dots .dot:nth-child(3) { background: #b8a9c9; animation-delay: 0.3s; }
        .header-dots .dot:nth-child(4) { background: #c9b896; animation-delay: 0.45s; }
        .header-dots .dot:nth-child(5) { background: #b0887e; animation-delay: 0.6s; }

        @keyframes dotFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        header h1 {
            font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--text-primary);
            letter-spacing: 4px;
            position: relative;
            display: inline-block;
            background: linear-gradient(135deg, #5c5248 0%, #8a7e72 50%, #b0887e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--accent-rose), var(--accent-sage), var(--accent-lavender), var(--accent-warm));
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 12px;
        }

        .main-layout {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            align-items: flex-start;
        }

        .control-panel {
            width: 340px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: sticky;
            top: 16px;
            z-index: 10;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(180, 160, 140, 0.3) transparent;
            padding-bottom: 8px;
        }

        .control-panel::-webkit-scrollbar {
            width: 4px;
        }

        .control-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .control-panel::-webkit-scrollbar-thumb {
            background: rgba(180, 160, 140, 0.3);
            border-radius: 4px;
        }

        .content-area {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .panel-section {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 14px;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .panel-section:hover {
            border-color: rgba(255, 255, 255, 0.40);
            box-shadow: var(--shadow-md);
        }

        .panel-section h3 {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }

        .upload-area {
            border: 2px dashed rgba(200, 180, 160, 0.35);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            position: relative;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-area:hover {
            border-color: var(--accent-rose);
            background: #f7f0eb;
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .upload-area .icon {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        .upload-area p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .upload-area .sub {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 2px;
        }

        .preview-section {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 14px;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .preview-section:hover {
            border-color: rgba(255, 255, 255, 0.40);
            box-shadow: var(--shadow-md);
        }

        .preview-section h3 {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }

        .preview-section .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: var(--radius-sm);
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .chart-section {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 14px;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .chart-section:hover {
            border-color: rgba(255, 255, 255, 0.40);
            box-shadow: var(--shadow-md);
        }

        .chart-section h3 {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }

        .result-info {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 14px;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .result-info:hover {
            border-color: rgba(255, 255, 255, 0.40);
            box-shadow: var(--shadow-md);
        }

        .result-info h3 {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }

        .action-divider {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 8px;
            margin-bottom: 4px;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
            }
            .control-panel {
                width: 100%;
            }
        }

        /* 滑块 */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--accent-rose), var(--accent-sage));
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: 2px solid var(--accent-rose);
            box-shadow: 0 2px 10px rgba(180, 130, 120, 0.25);
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        .k-value {
            display: inline-block;
            min-width: 36px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            background: var(--accent-rose);
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            box-shadow: var(--shadow-sm);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn {
            padding: 8px 18px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            white-space: nowrap;
            font-weight: 500;
            user-select: none;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 2px 10px rgba(140, 120, 100, 0.12);
        }

        .btn:active {
            transform: scale(0.96);
            box-shadow: 0 1px 4px rgba(140, 120, 100, 0.08);
            transition: transform 0.08s ease, box-shadow 0.08s ease;
        }

        .btn.active {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(196, 165, 157, 0.5);
            color: var(--accent-rose-deep);
            box-shadow: 0 2px 10px rgba(180, 130, 120, 0.1);
            font-weight: 600;
            transform: scale(1.02);
        }

        .btn.active:hover {
            transform: scale(1.04);
            box-shadow: 0 3px 14px rgba(180, 130, 120, 0.18);
        }

        .btn.active:active {
            transform: scale(0.97);
            box-shadow: 0 1px 6px rgba(180, 130, 120, 0.1);
        }

        .btn-primary {
            background: var(--accent-rose);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px 22px;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 4px 18px rgba(180, 130, 120, 0.25);
        }

        .btn-primary:active:not(:disabled) {
            transform: scale(0.96);
            box-shadow: 0 1px 6px rgba(180, 130, 120, 0.12);
            transition: transform 0.08s ease, box-shadow 0.08s ease;
        }

        .btn-primary:disabled {
            background: #d5c7be;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            color: #fff;
            pointer-events: none;
            opacity: 0.55;
        }

        /* 图表卡片 */
        .chart-container {
            width: 100%;
            height: 420px;
        }

        .color-swatches {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }

        .color-swatch {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            min-width: 140px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .color-swatch:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .color-swatch .swatch-block {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            flex-shrink: 0;
        }

        .color-swatch .swatch-info {
            font-size: 0.8rem;
            line-height: 1.4;
            color: var(--text-primary);
        }

        .color-swatch .swatch-info .pct {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .harmony-result {
            margin-top: 10px;
            padding: 12px;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            border-left: 3px solid var(--accent-sage);
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-primary);
            display: none;
        }

        .harmony-result.show {
            display: block;
        }

        .harmony-result ul {
            list-style: disc;
            color: var(--text-primary);
        }

        .harmony-result ul li {
            margin-bottom: 2px;
        }

        .btn-ai {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #2d3b8a, #4a5ec7);
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 14px rgba(45, 59, 138, 0.25);
            position: relative;
            overflow: hidden;
        }

        .btn-ai::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 60%);
            pointer-events: none;
        }

        .btn-ai:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 6px 22px rgba(45, 59, 138, 0.35);
        }

        .btn-ai:active:not(:disabled) {
            transform: scale(0.96);
            box-shadow: 0 2px 10px rgba(45, 59, 138, 0.2);
            transition: transform 0.08s ease, box-shadow 0.08s ease;
        }

        .btn-ai:disabled {
            background: #d5c7be;
            box-shadow: none;
            cursor: not-allowed;
            color: #fff;
            pointer-events: none;
            opacity: 0.55;
        }

        .btn-ai-icon {
            display: inline-block;
            margin-right: 4px;
            animation: shimmer 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            background: rgba(92, 82, 72, 0.92);
            color: #faf7f3;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 16px rgba(92, 82, 72, 0.25);
            animation: toastIn 0.35s ease, toastOut 0.35s ease 2.4s forwards;
            pointer-events: auto;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-12px); }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(140, 120, 100, 0.3);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-rose);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== 极简 Logo ========== */
        .site-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }

        .logo-outer {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(140, 120, 100, 0.4);

    <script>
        // ==================== 全局状态 ====================
        let allPixels = null;
        let currentImage = null;
        let imageBase64 = null;
        let clusterResult = null;
        let colorSpace = 'rgb';
        let chartType = 'pie';
        let currentK = 5;
        let chartInstance = null;
        let precisionMode = 'fine';

        // ==================== 初始化 ECharts ====================
        function initChart() {
            const container = document.getElementById('chartContainer');
            chartInstance = echarts.init(container);
            window.addEventListener('resize', () => chartInstance && chartInstance.resize());
            chartInstance.setOption({
                title: {
                    text: '等待聚类分析',
                    left: 'center',
                    top: 'center',
                    textStyle: { color: '#b0a599', fontSize: 16 }
                },
                backgroundColor: 'transparent'
            });
        }

        // ==================== UI 交互 ====================
        function updateKValue(val) {
            currentK = parseInt(val);
            document.getElementById('kDisplay').textContent = val;
        }

        function switchColorSpace(space, btn) {
            colorSpace = space;
            document.querySelectorAll('[data-space]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (space === 'rgb') {
                showToast('RGB 空间：计算快速，适合日常使用');
            } else {
                showToast('LAB 空间：更贴近人眼感知，色彩区分更准');
            }
        }

        function switchChartType(type, btn) {
            chartType = type;
            document.querySelectorAll('[data-chart]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (chartType === 'pie') {
                showToast('饼图：直观展示各颜色占比关系');
            } else {
                showToast('柱状图：便于比较各颜色像素数量');
            }
            if (clusterResult) {
                renderChart(clusterResult);
            }
        }

        function switchPrecision(mode, btn) {
            precisionMode = mode;
            document.querySelectorAll('[data-precision]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (mode === 'coarse') {
                showToast('粗糙模式：聚类结果准确度合适，适合快速预览');
            } else {
                showToast('精确模式：聚类结果准确，处理时间稍长，请耐心等待');
            }
        }

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            container.innerHTML = '';
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        // ==================== 图片处理 ====================
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                imageBase64 = e.target.result;
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    extractAllPixels(img);
                    showPreview(img);
                    document.getElementById('runBtn').disabled = false;
                    document.getElementById('harmonyBtn').disabled = true;
                    clusterResult = null;
                    document.getElementById('resultInfo').style.display = 'none';
                    document.getElementById('harmonyResult').classList.remove('show');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function extractAllPixels(img) {
            const maxDim = 1200;
            let w = img.width;
            let h = img.height;
            if (w > maxDim || h > maxDim) {
                const ratio = Math.min(maxDim / w, maxDim / h);
                w = Math.round(w * ratio);
                h = Math.round(h * ratio);
            }

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const imageData = ctx.getImageData(0, 0, w, h);

            const pixels = [];
            for (let i = 0; i < imageData.data.length; i += 4) {
                const r = imageData.data[i];
                const g = imageData.data[i + 1];
                const b = imageData.data[i + 2];
                const a = imageData.data[i + 3];
                if (a >= 128) pixels.push([r, g, b]);
            }

            allPixels = pixels;
        }

        function samplePixels(maxSamples) {
            if (!allPixels || allPixels.length === 0) return [];
            const n = allPixels.length;
            if (n <= maxSamples) return [...allPixels];
            const step = Math.floor(n / maxSamples);
            const result = [];
            for (let i = 0; i < n; i += step) {
                result.push(allPixels[i]);
                if (result.length >= maxSamples) break;
            }
            return result;
        }

        function showPreview(img) {
            const previewImg = document.getElementById('previewImg');
            previewImg.src = img.src;
            previewImg.style.display = 'block';
            document.getElementById('previewSection').style.display = 'block';
            document.getElementById('uploadText').style.display = 'none';
            const uploadArea = document.getElementById('uploadArea');
            const subEl = uploadArea.querySelector('.sub');
            if (subEl) subEl.style.display = 'none';
        }

        // ==================== 颜色空间转换 ====================
        function rgbToLab(r, g, b) {
            let vr = r / 255;
            let vg = g / 255;
            let vb = b / 255;

            vr = vr > 0.04045 ? Math.pow((vr + 0.055) / 1.055, 2.4) : vr / 12.92;
            vg = vg > 0.04045 ? Math.pow((vg + 0.055) / 1.055, 2.4) : vg / 12.92;
            vb = vb > 0.04045 ? Math.pow((vb + 0.055) / 1.055, 2.4) : vb / 12.92;

            vr *= 100;
            vg *= 100;
            vb *= 100;

            const x = vr * 0.4124564 + vg * 0.3575761 + vb * 0.1804375;
            const y = vr * 0.2126729 + vg * 0.7151522 + vb * 0.0721750;
            const z = vr * 0.0193339 + vg * 0.1191920 + vb * 0.9503041;

            const xn = 95.047;
            const yn = 100.000;
            const zn = 108.883;

            const fx = x / xn > 0.008856 ? Math.cbrt(x / xn) : (7.787 * x / xn) + 16 / 116;
            const fy = y / yn > 0.008856 ? Math.cbrt(y / yn) : (7.787 * y / yn) + 16 / 116;
            const fz = z / zn > 0.008856 ? Math.cbrt(z / zn) : (7.787 * z / zn) + 16 / 116;

            const L = (116 * fy) - 16;
            const A = 500 * (fx - fy);
            const B = 200 * (fy - fz);

            return [L, A, B];
        }

        function labToRgb(L, A, B_val) {
            const fy = (L + 16) / 116;
            const fx = A / 500 + fy;
            const fz = fy - B_val / 200;

            const xn = 95.047;
            const yn = 100.000;
            const zn = 108.883;

            const x = xn * (fx > 0.206893 ? fx * fx * fx : (fx - 16 / 116) / 7.787);
            const y = yn * (fy > 0.206893 ? fy * fy * fy : (fy - 16 / 116) / 7.787);
            const z = zn * (fz > 0.206893 ? fz * fz * fz : (fz - 16 / 116) / 7.787);

            let vr = x * 3.2404542 - y * 1.5371385 - z * 0.4985314;
            let vg = -x * 0.9692660 + y * 1.8760108 + z * 0.0415560;
            let vb = x * 0.0556434 - y * 0.2040259 + z * 1.0572252;

            vr = vr / 100;
            vg = vg / 100;
            vb = vb / 100;

            vr = vr > 0.0031308 ? 1.055 * Math.pow(vr, 1 / 2.4) - 0.055 : 12.92 * vr;
            vg = vg > 0.0031308 ? 1.055 * Math.pow(vg, 1 / 2.4) - 0.055 : 12.92 * vg;
            vb = vb > 0.0031308 ? 1.055 * Math.pow(vb, 1 / 2.4) - 0.055 : 12.92 * vb;

            const r = Math.max(0, Math.min(255, Math.round(vr * 255)));
            const g = Math.max(0, Math.min(255, Math.round(vg * 255)));
            const b = Math.max(0, Math.min(255, Math.round(vb * 255)));

            return [r, g, b];
        }

        function rgbToHue(r, g, b) {
            const nr = r / 255, ng = g / 255, nb = b / 255;
            const max = Math.max(nr, ng, nb), min = Math.min(nr, ng, nb);
            const delta = max - min;
            if (delta === 0) return 0;
            let h;
            if (max === nr) h = ((ng - nb) / delta) % 6;
            else if (max === ng) h = (nb - nr) / delta + 2;
            else h = (nr - ng) / delta + 4;
            h = Math.round(h * 60);
            return h < 0 ? h + 360 : h;
        }

        function findClosestColorName(rgb) {
            let minDist = Infinity;
            let bestName = '';
            for (const entry of COLOR_DATABASE) {
                const dr = rgb[0] - entry.r;
                const dg = rgb[1] - entry.g;
                const db = rgb[2] - entry.b;
                const dist = 2 * dr * dr + 4 * dg * dg + 3 * db * db;
                if (dist < minDist) {
                    minDist = dist;
                    bestName = entry.name;
                }
            }
            return bestName;
        }

        // ==================== 距离计算 ====================
        function euclideanDist(a, b) {
            let sum = 0;
            for (let i = 0; i < a.length; i++) {
                const d = a[i] - b[i];
                sum += d * d;
            }
            return Math.sqrt(sum);
        }

        // ==================== K-Means 聚类（自实现） ====================
        function kmeans(data, k, maxIter = 50, tolerance = 0.1) {
            const n = data.length;
            if (n === 0) return { centers: [], assignments: [], sizes: [], sse: Infinity };
            if (k > n) k = n;

            const centers = [];
            const firstIdx = Math.floor(Math.random() * n);
            centers.push([...data[firstIdx]]);

            for (let i = 1; i < k; i++) {
                const dists = new Array(n).fill(Infinity);
                for (let j = 0; j < n; j++) {
                    for (const c of centers) {
                        const d = euclideanDist(data[j], c);
                        if (d < dists[j]) dists[j] = d;
                    }
                }
                const totalDist = dists.reduce((s, d) => s + d * d, 0);
                let r = Math.random() * totalDist;
                let idx = 0;
                for (let j = 0; j < n; j++) {
                    r -= dists[j] * dists[j];
                    if (r <= 0) { idx = j; break; }
                }
                centers.push([...data[idx]]);
            }

            let assignments = new Array(n).fill(0);
            let prevCenters = null;

            for (let iter = 0; iter < maxIter; iter++) {
                let changed = 0;
                for (let i = 0; i < n; i++) {
                    let minDist = Infinity;
                    let bestCluster = 0;
                    for (let c = 0; c < k; c++) {
                        const dist = euclideanDist(data[i], centers[c]);
                        if (dist < minDist) {
                            minDist = dist;
                            bestCluster = c;
                        }
                    }
                    if (assignments[i] !== bestCluster) changed++;
                    assignments[i] = bestCluster;
                }

                const newCenters = Array.from({ length: k }, () =>
                    new Array(data[0].length).fill(0)
                );
                const counts = new Array(k).fill(0);

                for (let i = 0; i < n; i++) {
                    const c = assignments[i];
                    counts[c]++;
                    for (let d = 0; d < data[i].length; d++) {
                        newCenters[c][d] += data[i][d];
                    }
                }

                for (let c = 0; c < k; c++) {
                    if (counts[c] > 0) {
                        for (let d = 0; d < newCenters[c].length; d++) {
                            newCenters[c][d] /= counts[c];
                        }
                    } else {
                        const ri = Math.floor(Math.random() * n);
                        newCenters[c] = [...data[ri]];
                    }
                }

                let maxShift = 0;
                if (prevCenters) {
                    for (let c = 0; c < k; c++) {
                        const shift = euclideanDist(centers[c], newCenters[c]);
                        if (shift > maxShift) maxShift = shift;
                    }
                }

                for (let c = 0; c < k; c++) {
                    centers[c] = [...newCenters[c]];
                }
                prevCenters = newCenters.map(c => [...c]);

                if (maxShift < tolerance && prevCenters !== null) break;
            }

            const sizes = new Array(k).fill(0);
            for (let i = 0; i < n; i++) sizes[assignments[i]]++;

            let sse = 0;
            for (let i = 0; i < n; i++) {
                const c = assignments[i];
                const dist = euclideanDist(data[i], centers[c]);
                sse += dist * dist;
            }

            return { centers, assignments, sizes, sse };
        }

        function kmeansStable(data, k, restarts = 5) {
            let bestResult = null;
            let bestSSE = Infinity;
            for (let r = 0; r < restarts; r++) {
                const result = kmeans(data, k);
                if (result.sse < bestSSE) {
                    bestSSE = result.sse;
                    bestResult = result;
                }
            }
            return bestResult;
        }

        // ==================== 运行聚类 ====================
        function runClustering() {
            if (!allPixels || allPixels.length === 0) return;

            showLoading(true);

            setTimeout(() => {
                try {
                    const k = currentK;
                    const maxSamples = precisionMode === 'coarse' ? 100000 : 1000000;
                    const sampledPixels = samplePixels(maxSamples);
                    const totalSampled = sampledPixels.length;
                    let data = sampledPixels;

                    if (colorSpace === 'lab') {
                        data = data.map(([r, g, b]) => rgbToLab(r, g, b));
                    }

                    const restarts = precisionMode === 'coarse' ? 5 : 3;
                    const result = kmeansStable(data, k, restarts);

                    const centersRGB = result.centers.map(c => {
                        if (colorSpace === 'lab') {
                            const rgb = labToRgb(c[0], c[1], c[2]);
                            return rgb;
                        }
                        return [Math.round(c[0]), Math.round(c[1]), Math.round(c[2])];
                    });

                    clusterResult = {
                        centers: result.centers,
                        centersRGB,
                        sizes: result.sizes,
                        k,
                        total: totalSampled,
                        colorSpace,
                        colorNames: centersRGB.map(rgb => findClosestColorName(rgb)),
                    };

                    const sortIndices = clusterResult.centersRGB.map((rgb, i) => ({
                        i,
                        hue: rgbToHue(rgb[0], rgb[1], rgb[2])
                    })).sort((a, b) => a.hue - b.hue).map(x => x.i);
                    clusterResult.centers = sortIndices.map(i => clusterResult.centers[i]);
                    clusterResult.centersRGB = sortIndices.map(i => clusterResult.centersRGB[i]);
                    clusterResult.sizes = sortIndices.map(i => clusterResult.sizes[i]);
                    clusterResult.colorNames = sortIndices.map(i => clusterResult.colorNames[i]);

                    renderChart(clusterResult);
                    renderColorSwatches(clusterResult);
                    document.getElementById('resultInfo').style.display = 'block';
                    document.getElementById('harmonyBtn').disabled = false;
                    document.getElementById('harmonyResult').classList.remove('show');
                } catch (e) {
                    console.error('聚类失败:', e);
                    alert('聚类分析失败: ' + e.message);
                }
                showLoading(false);
            }, 100);
        }

                if (parsed && (typeof parsed.overallScore === 'number' || typeof parsed.score === 'number')) {
                    const overall = parsed.overallScore ?? parsed.score;
                    const colorS = parsed.colorScore ?? parsed.score;
                    const aesthetic = parsed.aestheticScore ?? overall;
                    const scoreColor = overall >= 8 ? '#8b9a84' : overall >= 5 ? '#c9b896' : '#b0887e';
                    const scoreLabel = overall >= 8 ? '优秀' : overall >= 5 ? '一般' : '较差';

                    let html = '<div style="margin-bottom:10px;"><strong style="color:#b0887e;">✦ DeepSeek-V4-Pro 配色分析</strong></div>';

                    html += '<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">' +
                        '<div style="flex:1;min-width:80px;text-align:center;padding:10px 6px;background:rgba(139,154,132,0.08);border-radius:10px;">' +
                        '<div style="font-size:1.4rem;font-weight:700;color:#8b9a84;">' + colorS + '</div>' +
                        '<div style="font-size:0.7rem;color:#8a7e72;margin-top:2px;">颜色和谐</div></div>' +
                        '<div style="flex:1;min-width:80px;text-align:center;padding:10px 6px;background:rgba(184,169,201,0.08);border-radius:10px;">' +
                        '<div style="font-size:1.4rem;font-weight:700;color:#b8a9c9;">' + aesthetic + '</div>' +
                        '<div style="font-size:0.7rem;color:#8a7e72;margin-top:2px;">整体美感</div></div>' +
                        '<div style="flex:1;min-width:80px;text-align:center;padding:10px 6px;border-radius:10px;background:' + (overall >= 8 ? 'rgba(139,154,132,0.15)' : overall >= 5 ? 'rgba(201,184,150,0.15)' : 'rgba(176,136,126,0.15)') + ';">' +
                        '<div style="font-size:1.4rem;font-weight:700;color:' + scoreColor + ';">' + overall + '</div>' +
                        '<div style="font-size:0.7rem;color:#8a7e72;margin-top:2px;">综合 · ' + scoreLabel + '</div></div></div>';

                    if (parsed.aestheticComment) {
                        html += '<div style="margin-bottom:12px;padding:10px 12px;background:rgba(184,169,201,0.06);border-left:3px solid #b8a9c9;border-radius:0 8px 8px 0;font-size:0.85rem;line-height:1.6;">' +
                            '<strong style="color:#b8a9c9;">✦ 配色方案分析</strong>' +
                            '<div style="color:#5c5248;margin-top:4px;">' + parsed.aestheticComment + '</div></div>';
                    }

                    if (parsed.harmonious && parsed.harmonious.length > 0) {
                        html += '<div style="margin-bottom:12px;"><strong style="color:#8b9a84;">✓ 和谐之处</strong><ul style="margin:4px 0 0 16px;color:#5c5248;font-size:0.85rem;">';
                        parsed.harmonious.forEach(function(h) { html += '<li>' + h + '</li>'; });
                        html += '</ul></div>';
                    }

                    if (parsed.disharmonious && parsed.disharmonious.length > 0) {
                        html += '<div style="margin-bottom:12px;"><strong style="color:#b0887e;">⚠ 不和谐之处与改进建议</strong>';
                        parsed.disharmonious.forEach(function(d) {
                            html += '<div style="margin:8px 0;padding:10px 12px;background:rgba(176,136,126,0.08);border-left:3px solid #b0887e;border-radius:0 8px 8px 0;font-size:0.85rem;line-height:1.6;">' +
                                '<div><strong style="color:#5c5248;">' + d.issue + '</strong></div>' +
                                '<div style="color:#8a7e72;">原因：' + d.reason + '</div>' +
                                '<div style="color:#8b9a84;">建议：' + d.suggestion + '</div></div>';
                        });
                        html += '</div>';
                    }

                    if (parsed.advice) {
                        html += '<div style="padding:10px 12px;background:rgba(139,154,132,0.08);border-left:3px solid #8b9a84;border-radius:0 8px 8px 0;font-size:0.85rem;line-height:1.6;">' +
                            '<strong style="color:#8b9a84;">✦ 综合改进建议</strong>' +
                            '<div style="color:#5c5248;margin-top:4px;">' + parsed.advice + '</div></div>';
                    }

                    html += '<details style="margin-top:16px;"><summary style="cursor:pointer;color:#8a7e72;font-size:0.8rem;letter-spacing:1px;">AI 完整分析原文</summary>' +
                        '<div style="margin-top:8px;padding:12px;background:rgba(0,0,0,0.03);border-radius:8px;color:#5c5248;font-size:0.85rem;line-height:1.8;white-space:pre-wrap;">' + content + '</div></details>';

                    harmonyDiv.innerHTML = html;
                } else {
                    harmonyDiv.innerHTML = '<strong style="color:#b0887e;">✦ DeepSeek-V4-Pro 配色分析结果：</strong><br><br>' + content.replace(/\n/g, '<br>');
                }
            } catch (error) {
                skeletonContainer.classList.remove('active');
                harmonyDiv.classList.add('show');
                harmonyDiv.innerHTML = '<strong style="color:#c9b896;">请求失败：</strong>' + error.message + '<br><br>' +
                    '<small style="color:#b0a599;">⚠ 请通过 Live Server 或本地 HTTP 服务器访问页面（而非 file:// 协议），否则浏览器会阻止跨域请求。<br>' +
                    '启动方式：在项目目录下运行 <code>python -m http.server 8080</code> 或使用 VS Code 的 Live Server 插件。</small>';
            }
        }

        // ==================== 辅助函数 ====================
        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('show', show);
        }

        // ==================== Infinite Marquee 初始化 ====================
        function initMarquee() {
            const track = document.getElementById('marqueeTrack');
            const items = [
                { text: '色谱实验室', dot: '#c4a59d' },
                { text: 'Color Atlas', dot: '#a8b5a2' },
                { text: '像素工坊', dot: '#b8a9c9' },
                { text: 'ColorNova', dot: '#c9b896' },
                { text: '色谱实验室', dot: '#c4a59d' },
                { text: 'Color Atlas', dot: '#a8b5a2' },
                { text: '像素工坊', dot: '#b8a9c9' },
                { text: 'ColorNova', dot: '#c9b896' },
            ];

            const listHtml = items.map(function(item) {
                return '<div class="marquee-logo-block">' +
                    '<div class="mini-logo" style="border-color:' + item.dot + ';">' +
                    '<span class="mini-dot" style="background:' + item.dot + ';"></span>' +
                    '</div>' +
                    '<span class="mini-text">' + item.text + '</span>' +
                    '</div>';
            }).join('');

            track.innerHTML = '<div class="marquee-item">' + listHtml + '</div><div class="marquee-copy">' + listHtml + '</div>';
        }

        // ==================== 页面初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            initChart();
            initMarquee();

            const uploadArea = document.getElementById('uploadArea');
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#c4a59d';
            });
            uploadArea.addEventListener('dragleave', function() {
                uploadArea.style.borderColor = '#d9cec3';
            });
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#d9cec3';
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    document.getElementById('fileInput').files = dt.files;
                    handleFileSelect({ target: { files: dt.files } });
                }
            });
        });
    </script>
</body>
</html>
