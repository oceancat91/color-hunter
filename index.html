<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片颜色聚类可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        /* ========== CSS 变量：莫兰迪色系 ========== */
        :root {
            --bg-primary: #e8e0d9;
            --bg-secondary: #f0ebe5;
            --card-bg: #faf7f3;
            --card-hover: #f5f1ec;
            --border: #d9cec3;
            --border-light: #e5ddd5;
            --text-primary: #5c5248;
            --text-secondary: #8a7e72;
            --text-muted: #b0a599;
            --accent-rose: #c4a59d;
            --accent-rose-deep: #b0887e;
            --accent-sage: #a8b5a2;
            --accent-sage-deep: #8b9a84;
            --accent-lavender: #b8a9c9;
            --accent-warm: #c9b896;
            --shadow-sm: 0 2px 8px rgba(140, 120, 100, 0.08);
            --shadow-md: 0 4px 16px rgba(140, 120, 100, 0.12);
            --shadow-lg: 0 8px 30px rgba(140, 120, 100, 0.15);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at 20% 20%, #ece5dd 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #e3dad0 0%, transparent 50%);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        header {
            text-align: center;
            padding: 36px 0 28px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 2px;
            margin-bottom: 8px;
            position: relative;
            display: inline-block;
        }

        header h1::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 3px;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--accent-rose), var(--accent-sage));
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 24px;
            margin-top: 10px;
        }

        /* 左侧控制面板 */
        .control-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 24px;
            height: fit-content;
            box-shadow: var(--shadow-md);
        }

        .panel-section {
            margin-bottom: 24px;
        }

        .panel-section:last-child {
            margin-bottom: 0;
        }

        .panel-section h3 {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light);
            font-weight: 600;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-secondary);
        }

        .upload-area:hover {
            border-color: var(--accent-rose);
            background: #f7f0eb;
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .upload-area .icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .upload-area p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .upload-area .sub {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-group label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            white-space: nowrap;
            min-width: 20px;
        }

        .slider-group input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--accent-rose), var(--accent-sage));
            outline: none;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: 2px solid var(--accent-rose);
            box-shadow: 0 2px 10px rgba(180, 130, 120, 0.25);
            transition: transform 0.2s;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        .k-value {
            display: inline-block;
            width: 38px;
            height: 38px;
            line-height: 38px;
            text-align: center;
            background: var(--accent-rose);
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            box-shadow: var(--shadow-sm);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn {
            padding: 8px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.25s ease;
            white-space: nowrap;
            font-weight: 500;
        }

        .btn:hover {
            border-color: var(--accent-rose);
            background: #f7f0eb;
            color: var(--accent-rose-deep);
        }

        .btn.active {
            border-color: var(--accent-rose);
            background: #f5ede7;
            color: var(--accent-rose-deep);
            box-shadow: 0 2px 12px rgba(180, 130, 120, 0.15);
            font-weight: 600;
        }

        .btn-primary {
            background: var(--accent-rose);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px 22px;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: var(--accent-rose-deep);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
            opacity: 1;
        }

        .btn-primary:disabled {
            background: #d5cec7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            color: rgba(255, 255, 255, 0.7);
        }

        /* 右侧内容区 */
        .content-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .preview-section {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            box-shadow: var(--shadow-sm);
        }

        .preview-section canvas {
            max-width: 100%;
            max-height: 300px;
            border-radius: var(--radius-sm);
            object-fit: contain;
            box-shadow: var(--shadow-md);
        }

        .preview-section .placeholder {
            color: var(--text-muted);
            font-size: 1rem;
            text-align: center;
        }

        .chart-section {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .chart-container {
            width: 100%;
            height: 450px;
        }

        .result-info {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .result-info h3 {
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
        }

        .color-swatches {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
        }

        .color-swatch {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            min-width: 150px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .color-swatch:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .color-swatch .swatch-block {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            flex-shrink: 0;
        }

        .color-swatch .swatch-info {
            font-size: 0.8rem;
            line-height: 1.5;
            color: var(--text-primary);
        }

        .color-swatch .swatch-info .pct {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .harmony-result {
            margin-top: 14px;
            padding: 16px;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            border-left: 3px solid var(--accent-sage);
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text-primary);
            display: none;
        }

        .harmony-result.show {
            display: block;
        }

        .harmony-result.loading {
            border-left-color: var(--accent-warm);
        }

        .ai-subtitle {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .btn-ai {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #2d3b8a, #4a5ec7);
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 14px rgba(45, 59, 138, 0.25);
            position: relative;
            overflow: hidden;
        }

        .btn-ai::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 60%);
            pointer-events: none;
        }

        .btn-ai:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(45, 59, 138, 0.35);
            background: linear-gradient(135deg, #3548a0, #5569d4);
        }

        .btn-ai:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-ai:disabled {
            background: linear-gradient(135deg, #b0a599, #c5bcb3);
            box-shadow: none;
            cursor: not-allowed;
            color: rgba(255, 255, 255, 0.6);
        }

        .btn-ai:disabled::before {
            display: none;
        }

        .btn-ai-icon {
            display: inline-block;
            margin-right: 4px;
            animation: shimmer 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(140, 120, 100, 0.3);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-rose);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .control-panel {
                order: 2;
            }

            .content-area {
                order: 1;
            }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <header>
            <h1>图片颜色聚类可视化</h1>
            <p>基于 K-Means 算法的像素颜色分析与 ECharts 可视化展示</p>
        </header>

        <div class="main-layout">
            <!-- 左侧控制面板 -->
            <aside class="control-panel">
                <!-- 图片选择 -->
                <div class="panel-section">
                    <h3>选择图片</h3>
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                        <div class="icon">📷</div>
                        <p>点击上传图片</p>
                        <p class="sub">支持 JPG / PNG / WebP</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
                </div>

                <!-- 聚类参数 -->
                <div class="panel-section">
                    <h3>聚类参数 K</h3>
                    <div class="slider-group">
                        <label>K =</label>
                        <input type="range" id="kSlider" min="2" max="15" value="5" oninput="updateKValue(this.value)">
                        <span class="k-value" id="kDisplay">5</span>
                    </div>
                </div>

                <!-- 颜色空间 -->
                <div class="panel-section">
                    <h3>颜色空间</h3>
                    <div class="btn-group">
                        <button class="btn active" data-space="rgb" onclick="switchColorSpace('rgb', this)">RGB</button>
                        <button class="btn" data-space="lab" onclick="switchColorSpace('lab', this)">LAB</button>
                    </div>
                </div>

                <!-- 图表类型 -->
                <div class="panel-section">
                    <h3>图表类型</h3>
                    <div class="btn-group">
                        <button class="btn active" data-chart="pie" onclick="switchChartType('pie', this)">饼图</button>
                        <button class="btn" data-chart="bar" onclick="switchChartType('bar', this)">柱状图</button>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="panel-section">
                    <button class="btn btn-primary" id="runBtn" onclick="runClustering()" style="width:100%" disabled>
                        运行聚类分析
                    </button>
                </div>

                <!-- AI 颜色和谐度判断 -->
                <div class="panel-section">
                    <h3>AI 颜色和谐度判断</h3>
                    <p class="ai-subtitle">基于 DeepSeek-V4-Pro 分析配色和谐度</p>
                    <button class="btn btn-ai" id="harmonyBtn" onclick="checkColorHarmony()" disabled>
                        <span class="btn-ai-icon">✦</span> 判断颜色和谐度
                    </button>
                </div>
            </aside>

            <!-- 右侧内容区 -->
            <main class="content-area">
                <!-- 图片预览 -->
                <div class="preview-section" id="previewSection">
                    <p class="placeholder">请选择一张图片开始分析</p>
                </div>

                <!-- ECharts 图表 -->
                <div class="chart-section">
                    <div class="chart-container" id="chartContainer"></div>
                </div>

                <!-- 结果信息 -->
                <div class="result-info" id="resultInfo" style="display:none">
                    <h3 style="margin-bottom:6px; color:#5c5248;">聚类结果</h3>
                    <div class="color-swatches" id="colorSwatches"></div>
                    <div class="harmony-result" id="harmonyResult"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        let currentImage = null;
        let imagePixels = null; // { data: ImageData, width, height }
        let clusterResult = null;
        let colorSpace = 'rgb'; // 'rgb' | 'lab'
        let chartType = 'pie'; // 'pie' | 'bar'
        let currentK = 5;
        let chartInstance = null;

        // ==================== 初始化 ECharts ====================
        function initChart() {
            const container = document.getElementById('chartContainer');
            chartInstance = echarts.init(container);
            window.addEventListener('resize', () => chartInstance && chartInstance.resize());
            // 初始空状态
            chartInstance.setOption({
                title: {
                    text: '等待聚类分析',
                    left: 'center',
                    top: 'center',
                    textStyle: { color: '#b0a599', fontSize: 16 }
                },
                backgroundColor: 'transparent'
            });
        }

        // ==================== UI 交互 ====================
        function updateKValue(val) {
            currentK = parseInt(val);
            document.getElementById('kDisplay').textContent = val;
        }

        function switchColorSpace(space, btn) {
            colorSpace = space;
            document.querySelectorAll('[data-space]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function switchChartType(type, btn) {
            chartType = type;
            document.querySelectorAll('[data-chart]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (clusterResult) {
                renderChart(clusterResult);
            }
        }

        // ==================== 图片处理 ====================
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    extractPixels(img);
                    showPreview(img);
                    document.getElementById('runBtn').disabled = false;
                    document.getElementById('harmonyBtn').disabled = true;
                    clusterResult = null;
                    document.getElementById('resultInfo').style.display = 'none';
                    document.getElementById('harmonyResult').classList.remove('show');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function extractPixels(img) {
            const maxDim = 300; // 缩放以加速计算
            let w = img.width;
            let h = img.height;
            if (w > maxDim || h > maxDim) {
                const ratio = Math.min(maxDim / w, maxDim / h);
                w = Math.round(w * ratio);
                h = Math.round(h * ratio);
            }

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const imageData = ctx.getImageData(0, 0, w, h);

            // 额外采样：每 step 个像素取一个
            const totalPixels = w * h;
            const maxSamples = 5000;
            const step = Math.max(1, Math.floor(totalPixels / maxSamples));

            const pixels = [];
            for (let i = 0; i < imageData.data.length; i += step * 4) {
                const r = imageData.data[i];
                const g = imageData.data[i + 1];
                const b = imageData.data[i + 2];
                const a = imageData.data[i + 3];
                if (a < 128) continue; // 跳过透明像素
                pixels.push([r, g, b]);
            }

            imagePixels = pixels;
        }

        function showPreview(img) {
            const section = document.getElementById('previewSection');
            section.innerHTML = '';
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const maxW = 600;
            if (img.width > maxW) {
                canvas.style.width = maxW + 'px';
                canvas.style.height = (img.height * maxW / img.width) + 'px';
            }
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            section.appendChild(canvas);
        }

        // ==================== 颜色空间转换 ====================
        function rgbToLab(r, g, b) {
            // RGB → XYZ
            let vr = r / 255;
            let vg = g / 255;
            let vb = b / 255;

            vr = vr > 0.04045 ? Math.pow((vr + 0.055) / 1.055, 2.4) : vr / 12.92;
            vg = vg > 0.04045 ? Math.pow((vg + 0.055) / 1.055, 2.4) : vg / 12.92;
            vb = vb > 0.04045 ? Math.pow((vb + 0.055) / 1.055, 2.4) : vb / 12.92;

            vr *= 100;
            vg *= 100;
            vb *= 100;

            const x = vr * 0.4124564 + vg * 0.3575761 + vb * 0.1804375;
            const y = vr * 0.2126729 + vg * 0.7151522 + vb * 0.0721750;
            const z = vr * 0.0193339 + vg * 0.1191920 + vb * 0.9503041;

            // XYZ → LAB (D65)
            const xn = 95.047;
            const yn = 100.000;
            const zn = 108.883;

            const fx = x / xn > 0.008856 ? Math.cbrt(x / xn) : (7.787 * x / xn) + 16 / 116;
            const fy = y / yn > 0.008856 ? Math.cbrt(y / yn) : (7.787 * y / yn) + 16 / 116;
            const fz = z / zn > 0.008856 ? Math.cbrt(z / zn) : (7.787 * z / zn) + 16 / 116;

            const L = (116 * fy) - 16;
            const A = 500 * (fx - fy);
            const B = 200 * (fy - fz);

            return [L, A, B];
        }

        function labToRgb(L, A, B_val) {
            // LAB → XYZ
            const fy = (L + 16) / 116;
            const fx = A / 500 + fy;
            const fz = fy - B_val / 200;

            const xn = 95.047;
            const yn = 100.000;
            const zn = 108.883;

            const x = xn * (fx > 0.206893 ? fx * fx * fx : (fx - 16 / 116) / 7.787);
            const y = yn * (fy > 0.206893 ? fy * fy * fy : (fy - 16 / 116) / 7.787);
            const z = zn * (fz > 0.206893 ? fz * fz * fz : (fz - 16 / 116) / 7.787);

            // XYZ → RGB
            let vr = x * 3.2404542 - y * 1.5371385 - z * 0.4985314;
            let vg = -x * 0.9692660 + y * 1.8760108 + z * 0.0415560;
            let vb = x * 0.0556434 - y * 0.2040259 + z * 1.0572252;

            vr = vr / 100;
            vg = vg / 100;
            vb = vb / 100;

            vr = vr > 0.0031308 ? 1.055 * Math.pow(vr, 1 / 2.4) - 0.055 : 12.92 * vr;
            vg = vg > 0.0031308 ? 1.055 * Math.pow(vg, 1 / 2.4) - 0.055 : 12.92 * vg;
            vb = vb > 0.0031308 ? 1.055 * Math.pow(vb, 1 / 2.4) - 0.055 : 12.92 * vb;

            const r = Math.max(0, Math.min(255, Math.round(vr * 255)));
            const g = Math.max(0, Math.min(255, Math.round(vg * 255)));
            const b = Math.max(0, Math.min(255, Math.round(vb * 255)));

        function findClosestColorName(rgb) {
            let minDist = Infinity;
            let bestName = '';
            for (const entry of COLOR_DATABASE) {
                const dr = rgb[0] - entry.r;
                const dg = rgb[1] - entry.g;
                const db = rgb[2] - entry.b;
                // 加权距离：人眼对绿色最敏感，红色次之，蓝色最弱
                const dist = 2 * dr * dr + 4 * dg * dg + 3 * db * db;
                if (dist < minDist) {
                    minDist = dist;
                    bestName = entry.name;
                }
            }
            return bestName;
        }

        // ==================== 距离计算 ====================
        function euclideanDist(a, b) {
            let sum = 0;
            for (let i = 0; i < a.length; i++) {
                const d = a[i] - b[i];
                sum += d * d;
            }
            return Math.sqrt(sum);
        }

        // ==================== K-Means 聚类（自实现） ====================
        function kmeans(data, k, maxIter = 50, tolerance = 0.1) {
            const n = data.length;
            if (n === 0) return { centers: [], assignments: [], sizes: [] };
            if (k > n) k = n;

            // Step 1: 随机初始化 K 个中心（K-means++ 初始化可得到更好结果）
            const centers = [];
            // 使用 K-means++ 初始化
            const firstIdx = Math.floor(Math.random() * n);
            centers.push([...data[firstIdx]]);

            for (let i = 1; i < k; i++) {
                const dists = new Array(n).fill(Infinity);
                for (let j = 0; j < n; j++) {
                    for (const c of centers) {
                        const d = euclideanDist(data[j], c);
                        if (d < dists[j]) dists[j] = d;
                    }
                }
                // 按距离平方加权随机选择
                const totalDist = dists.reduce((s, d) => s + d * d, 0);
                let r = Math.random() * totalDist;
                let idx = 0;
                for (let j = 0; j < n; j++) {
                    r -= dists[j] * dists[j];
                    if (r <= 0) { idx = j; break; }
                }
                centers.push([...data[idx]]);
            }

            let assignments = new Array(n).fill(0);
            let prevCenters = null;

            for (let iter = 0; iter < maxIter; iter++) {
                // Step 2: 将每个数据点归为距离最近的中心
                let changed = 0;
                for (let i = 0; i < n; i++) {
                    let minDist = Infinity;
                    let bestCluster = 0;
                    for (let c = 0; c < k; c++) {
                        const dist = euclideanDist(data[i], centers[c]);
                        if (dist < minDist) {
                            minDist = dist;
                            bestCluster = c;
                        }
                    }
                    if (assignments[i] !== bestCluster) changed++;
                    assignments[i] = bestCluster;
                }

                // Step 3: 重新计算中心位置
                const newCenters = Array.from({ length: k }, () =>
                    new Array(data[0].length).fill(0)
                );
                const counts = new Array(k).fill(0);

                for (let i = 0; i < n; i++) {
                    const c = assignments[i];
                    counts[c]++;
                    for (let d = 0; d < data[i].length; d++) {
                        newCenters[c][d] += data[i][d];
                    }
                }

                for (let c = 0; c < k; c++) {
                    if (counts[c] > 0) {
                        for (let d = 0; d < newCenters[c].length; d++) {
                            newCenters[c][d] /= counts[c];
                        }
                    } else {
                        // 空类簇：重新随机初始化
                        const ri = Math.floor(Math.random() * n);
                        newCenters[c] = [...data[ri]];
                    }
                }

                // Step 4: 检查收敛
                let maxShift = 0;
                if (prevCenters) {
                    for (let c = 0; c < k; c++) {
                        const shift = euclideanDist(centers[c], newCenters[c]);
                        if (shift > maxShift) maxShift = shift;
                    }
                }

                for (let c = 0; c < k; c++) {
                    centers[c] = [...newCenters[c]];
                }
                prevCenters = newCenters.map(c => [...c]);

                if (maxShift < tolerance && prevCenters !== null) break;
            }

            // 计算每个类簇的大小
            const sizes = new Array(k).fill(0);
            for (let i = 0; i < n; i++) sizes[assignments[i]]++;

            // 计算 SSE（类内平方和），用于多轮选优
            let sse = 0;
            for (let i = 0; i < n; i++) {
                const c = assignments[i];
                const dist = euclideanDist(data[i], centers[c]);
                sse += dist * dist;
            }

            return { centers, assignments, sizes, sse };
        }

        // ==================== K-Means 多轮稳定版 ====================
        // 运行 restarts 次，选取 SSE 最低的结果，消除随机初始化的波动
        function kmeansStable(data, k, restarts = 5) {
            let bestResult = null;
            let bestSSE = Infinity;
            for (let r = 0; r < restarts; r++) {
                const result = kmeans(data, k);
                if (result.sse < bestSSE) {
                    bestSSE = result.sse;
                    bestResult = result;
                }
            }
            return bestResult;
        }

        // ==================== 运行聚类 ====================
        function runClustering() {
            if (!imagePixels || imagePixels.length === 0) return;

            showLoading(true);

            setTimeout(() => {
                try {
                    const k = currentK;
                    let data = [...imagePixels];

                    // 颜色空间转换
                    if (colorSpace === 'lab') {
                        data = data.map(([r, g, b]) => rgbToLab(r, g, b));
                    }

                    // 执行 K-Means（多轮取 SSE 最小，消除随机波动）
                    const result = kmeansStable(data, k, 8);

                    // 转换中心点回 RGB 用于展示
                    const centersRGB = result.centers.map(c => {
                        if (colorSpace === 'lab') {
                            const rgb = labToRgb(c[0], c[1], c[2]);
                            return rgb;
                        }
                        return [Math.round(c[0]), Math.round(c[1]), Math.round(c[2])];
                    });

                    clusterResult = {
                        centers: result.centers,
                        centersRGB,
                        sizes: result.sizes,
                        k,
                        total: imagePixels.length,
                        colorSpace,
                        colorNames: centersRGB.map(rgb => findClosestColorName(rgb)),
                    };

                    // 渲染
                    renderChart(clusterResult);
                    renderColorSwatches(clusterResult);
                    document.getElementById('resultInfo').style.display = 'block';
                    document.getElementById('harmonyBtn').disabled = false;
                    document.getElementById('harmonyResult').classList.remove('show');
                } catch (e) {
                    console.error('聚类失败:', e);
                    alert('聚类分析失败: ' + e.message);
                }
                showLoading(false);
            }, 100);
        }

        // ==================== 色块展示 ====================
        function renderColorSwatches(result) {
            const container = document.getElementById('colorSwatches');
            const { centersRGB, sizes, total, colorNames } = result;

            container.innerHTML = centersRGB
                .map((rgb, i) => {
                    const pct = total > 0 ? (sizes[i] / total * 100).toFixed(1) : '0.0';
                    // 根据亮度决定文字颜色
                    const lum = rgb[0] * 0.299 + rgb[1] * 0.587 + rgb[2] * 0.114;
                    const textColor = lum > 160 ? '#5c5248' : '#fff';
                    const subColor = lum > 160 ? '#8a7e72' : 'rgba(255,255,255,0.7)';
                    return `
                <div class="color-swatch">
                  <div class="swatch-block" style="background:rgb(${rgb[0]},${rgb[1]},${rgb[2]})"></div>
                  <div class="swatch-info" style="color:${textColor}">
                    <strong>${colorNames[i]}</strong>
                    <span style="color:${subColor}; font-size:0.75rem;"><br>类簇${i + 1} · RGB(${rgb[0]}, ${rgb[1]}, ${rgb[2]})</span>
                    <span class="pct"> | ${sizes[i]} 像素 (${pct}%)</span>
                  </div>
                </div>
              `;
                })
                .join('');
        }

        // ==================== AI 颜色和谐度判断 ====================
        async function checkColorHarmony() {
            if (!clusterResult || clusterResult.centersRGB.length === 0) return;

            const harmonyDiv = document.getElementById('harmonyResult');
            const harmonyBtn = document.getElementById('harmonyBtn');
            harmonyDiv.classList.add('show', 'loading');
            harmonyDiv.innerHTML = '⏳ 正在调用 DeepSeek-V4-Pro 分析颜色和谐度...';

            // 构建颜色描述
            const colorDescriptions = clusterResult.centersRGB
                .map((rgb, i) => `${clusterResult.colorNames[i]}(RGB: ${rgb[0]}, ${rgb[1]}, ${rgb[2]})`)
                .join('；');

            const prompt = `请从色彩搭配专业角度判断以下 ${clusterResult.k} 种颜色组合是否和谐美观，并给出简要分析和评分（满分10分）：\n${colorDescriptions}\n请用中文回答。`;

            const apiUrl = 'https://api.deepseek.com/chat/completions';
            const apiKey = 'sk-26a25811b46d4996b9f08b5758aab84e';

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: '你是一位专业的色彩搭配设计师，擅长分析颜色和谐度。' },
                            { role: 'user', content: prompt },
                        ],
                        temperature: 0.7,
                        max_tokens: 500,
                    }),
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                const content = data.choices?.[0]?.message?.content || 'AI 未返回有效结果';

                harmonyDiv.classList.remove('loading');
                harmonyDiv.innerHTML = `
              <strong style="color:#b0887e;">✦ DeepSeek-V4-Pro 颜色和谐度分析结果：</strong><br><br>
              ${content.replace(/\n/g, '<br>')}
            `;
            } catch (error) {
                harmonyDiv.classList.remove('loading');
                harmonyDiv.innerHTML = `
              <strong style="color:#c9b896;">请求失败：</strong>
              ${error.message}<br><br>
              <small style="color:#b0a599;">提示：请检查网络连接，DeepSeek API 地址为 https://api.deepseek.com/chat/completions</small>
            `;
            }
        }

        // ==================== 辅助函数 ====================
        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('show', show);
        }

        // ==================== 页面初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initChart();

            // 拖拽上传支持
            const uploadArea = document.getElementById('uploadArea');
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#c4a59d';
            });
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.borderColor = '#d9cec3';
            });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#d9cec3';
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    document.getElementById('fileInput').files = dt.files;
                    handleFileSelect({ target: { files: dt.files } });
                }
            });
        });
    </script>
</body>
</html>
